<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Promoción Día de la Madre</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background: linear-gradient(180deg,#ffe3ec,#fff);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding: 20px 10px; /* Espacio mínimo lateral para que no choque con los bordes del cel */
}

/* CONTENEDOR PRINCIPAL */
.container{
  width: 100%;
  max-width:600px;
  text-align:center;
  display: flex;
  flex-direction: column;
  align-items: center; /* Centra todo el contenido internamente */
  animation: fadeIn 1.2s ease;
}

/* IMAGEN PROMO - CORREGIDA PARA CELULAR */
.promo-img{
  display: block;
  width: 100%;         /* Ocupa el 100% del ancho del contenedor */
  height: auto;        /* Mantiene la proporción real */
  max-width: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,.15);
  animation: float 4s ease-in-out infinite;
  margin-bottom: 20px; /* Espacio bajo la imagen */
}

/* RECUADRO URGENCIA */
.promo-urgencia{
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
}

.promo-urgencia::before{
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 18px;
  background: linear-gradient(90deg,#ff3d6e,#ff7aa2,#ff3d6e);
  background-size: 300%;
  animation: bordeMove 6s linear infinite;
  z-index: 0;
}

.promo-urgencia::after{
  content: "";
  position: absolute;
  inset: 2px;
  background: white;
  border-radius: 14px;
  z-index: 1;
}

.urgencia-texto{
  position: relative;
  z-index: 2;
  white-space: nowrap;
  font-weight: bold;
  color: #ff3d6e;
  font-size: 14px;
  animation: textoMove 10s linear infinite;
}

/* BOTON WHATSAPP */
.btn-wsp{
  margin-top: 25px;
  display: inline-block;
  background: #25D366;
  color: white;
  padding: 18px 25px;
  font-size: 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(0,0,0,.15);
  animation: pulse 2s infinite;
  transition: .3s;
  width: 90%; /* Casi todo el ancho en móvil */
  max-width: 350px;
}

/* BOTON VOLVER */
.btn-back{
  margin-top: 20px;
  display: inline-block;
  background: #111;
  color: #fff;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 14px;
}

/* ANIMACIONES */
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}
  70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

@keyframes float{
  0%, 100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes bordeMove{
  0%{background-position:0%}
  100%{background-position:300%}
}

@keyframes textoMove{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-120%)}
}

/* AJUSTE PARA PANTALLAS MUY PEQUEÑAS */
@media (max-width: 400px) {
  .btn-wsp { font-size: 16px; padding: 15px; }
  .urgencia-texto { font-size: 12px; }
}
</style>
</head>

<body>

<div class="container">

  <img src="assets/promo-madre.jpg" class="promo-img" alt="Promoción Día de la Madre">

  <div class="promo-urgencia">
    <div class="urgencia-texto">
      🎁 PROMOCIÓN VÁLIDA HASTA AGOTAR STOCK • ESCRÍBENOS AHORA •
    </div>
  </div>

  <a class="btn-wsp" href="https://wa.me/59168807598?text=Hola%20quiero%20la%20PROMOCIÓN%20POR%20EL%20DÍA%20DE%20LA%20MADRE" target="_blank">
    QUIERO LA PROMOCIÓN 💖
  </a>

  <a href="index.html" class="btn-back">← Volver al catálogo</a>

</div>

</body>
</html>
