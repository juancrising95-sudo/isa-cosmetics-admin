<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ISA Cosmetics</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

  <div id="pantalla-login">
    <div class="login-box">
      <h2>🔐 Acceso Administrador</h2>
      <p>ISA Cosmetics</p>
      <input type="email" id="email" placeholder="Correo electrónico">
      <input type="password" id="password" placeholder="Contraseña">
      <button id="btn-login">Ingresar</button>
      <p id="login-error"></p>
    </div>
  </div>

  <div id="panel-admin" style="display:none">
    <div class="admin-header">
      <h1>⚙️ Panel Admin — ISA Cosmetics</h1>
      <div class="admin-user">
        <span id="usuario-activo"></span>
        <button id="btn-logout">Cerrar sesión</button>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn activo" data-tab="productos">📦 Productos</button>
      <button class="tab-btn" data-tab="marcas">🏷️ Marcas</button>
      <button class="tab-btn" data-tab="promociones">🎯 Promociones</button>
    </div>

    <div id="tab-productos" class="tab-contenido">
      <div class="seccion-header">
        <h2>Productos</h2>
        <button id="btn-nuevo-producto" class="btn-agregar">+ Agregar producto</button>
      </div>
      <div class="filtros">
        <select id="filtro-categoria"><option value="">Todas las categorías</option></select>
        <select id="filtro-marca"><option value="">Todas las marcas</option></select>
      </div>
      <div class="barra-busqueda">
        <input type="text" id="buscar-producto" placeholder="🔍 Buscar producto por nombre...">
        <span id="contador-productos"></span>
      </div>
      <div id="lista-productos" class="lista-admin"></div>
    </div>

    <div id="tab-marcas" class="tab-contenido" style="display:none">
      <div class="seccion-header">
        <h2>Marcas</h2>
        <button id="btn-nueva-marca" class="btn-agregar">+ Agregar marca</button>
      </div>
      <div id="lista-marcas" class="lista-admin"></div>
    </div>

    <div id="tab-promociones" class="tab-contenido" style="display:none">
      <div class="seccion-header">
        <h2>Promociones</h2>
        <button id="btn-nuevo-banner" class="btn-agregar">+ Agregar banner</button>
      </div>
      <div id="lista-banners" class="lista-admin"></div>
    </div>
  </div>

  <div id="modal-producto" class="modal" style="display:none">
    <div class="modal-box">
      <h3 id="modal-titulo">Producto</h3>
      <input type="hidden" id="prod-id">
      <input type="hidden" id="prod-imagen">

      <label>Imagen del producto</label>
      <div class="imagen-preview-box">
        <img id="preview-imagen" src="" alt="Preview" style="display:none">
        <div id="preview-placeholder">Sin imagen</div>
      </div>
      <div class="imagen-botones">
        <input type="file" id="input-imagen" accept="image/*" style="display:none">
        <button type="button" id="btn-cambiar-imagen" class="btn-imagen">📷 Subir imagen</button>
        <button type="button" id="btn-quitar-imagen" class="btn-imagen btn-imagen-quitar">🗑️ Quitar imagen</button>
      </div>
      <p id="upload-status"></p>

      <label>Nombre</label>
      <input type="text" id="prod-nombre" placeholder="Nombre del producto">
      <label>Descripción</label>
      <textarea id="prod-descripcion" rows="4" placeholder="Descripción"></textarea>
      <label>Precio (Bs)</label>
      <input type="text" id="prod-precio" placeholder="Ej: 150">
      <label>Categoría</label>
      <select id="prod-categoria"></select>
      <label>Marca</label>
      <select id="prod-marca"></select>
      <label class="check-label">
        <input type="checkbox" id="prod-activo" checked>
        Producto activo (visible en catálogo)
      </label>
      <div class="modal-botones">
        <button id="btn-guardar-producto" class="btn-guardar">Guardar</button>
        <button id="btn-cancelar-producto" class="btn-cancelar">Cancelar</button>
      </div>
      <p id="modal-error"></p>
    </div>
  </div>

<script type="module">
import { supabase } from "./supabase.js"

const { data: { session } } = await supabase.auth.getSession()
if (session) iniciarPanel(session.user.email)

document.getElementById("btn-login").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value.trim()
  const { data, error } = await supabase.auth.signInWithPassword({ email, password })
  if (error) {
    document.getElementById("login-error").textContent = "Correo o contraseña incorrectos."
  } else {
    iniciarPanel(data.user.email)
  }
})

document.getElementById("btn-logout").addEventListener("click", async () => {
  await supabase.auth.signOut()
  location.reload()
})

function iniciarPanel(email) {
  document.getElementById("pantalla-login").style.display = "none"
  document.getElementById("panel-admin").style.display = "block"
  document.getElementById("usuario-activo").textContent = email
  cargarTodo()
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"))
    document.querySelectorAll(".tab-contenido").forEach(t => t.style.display = "none")
    btn.classList.add("activo")
    document.getElementById("tab-" + btn.dataset.tab).style.display = "block"
  })
})

let categorias = []
let marcas = []

async function cargarTodo() {
  const [resCat, resMar] = await Promise.all([
    supabase.from("categorias").select("*").order("orden"),
    supabase.from("marcas").select("*").order("nombre")
  ])
  categorias = resCat.data || []
  marcas = resMar.data || []
  llenarFiltros()
  cargarProductos()
  cargarMarcasPanel()
}

function llenarFiltros() {
  const selCat = document.getElementById("filtro-categoria")
  const selMar = document.getElementById("filtro-marca")
  categorias.forEach(c => { selCat.innerHTML += `<option value="${c.id}">${c.nombre}</option>` })
  marcas.forEach(m => { selMar.innerHTML += `<option value="${m.id}">${m.nombre}</option>` })
  selCat.addEventListener("change", cargarProductos)
  selMar.addEventListener("change", cargarProductos)
  document.getElementById("buscar-producto").addEventListener("input", cargarProductos)
}

async function cargarProductos() {
  const catId = document.getElementById("filtro-categoria").value
  const marId = document.getElementById("filtro-marca").value
  const busqueda = document.getElementById("buscar-producto").value.toLowerCase().trim()

  let query = supabase.from("productos")
    .select("*, marcas(nombre), categorias(nombre)").order("orden")
  if (catId) query = query.eq("categoria_id", catId)
  if (marId) query = query.eq("marca_id", marId)

  const { data, error } = await query
  if (error) { console.error(error); return }

  const filtrados = busqueda ? data.filter(p => p.nombre.toLowerCase().includes(busqueda)) : data

  document.getElementById("contador-productos").textContent =
    `${filtrados.length} producto${filtrados.length !== 1 ? 's' : ''} encontrado${filtrados.length !== 1 ? 's' : ''}`

  const lista = document.getElementById("lista-productos")
  lista.innerHTML = ""
  filtrados.forEach((p, index) => {
    const div = document.createElement("div")
    div.className = "item-admin"
    div.innerHTML = `
      <span class="item-numero">${index + 1}</span>
      <img src="${p.imagen_url || ''}" onerror="this.style.display='none'" class="item-thumb">
      <div class="item-info">
        <strong>${p.nombre}</strong>
        <span>${p.marcas?.nombre || ''} — ${p.categorias?.nombre || ''}</span>
        <span class="precio-tag">${p.precio ? 'Bs ' + String(p.precio).replace(/^Bs\s*/i,'') : 'S/P'}</span>
        <span class="estado-tag ${p.activo ? 'activo' : 'inactivo'}">${p.activo ? 'Activo' : 'Inactivo'}</span>
      </div>
      <div class="item-acciones">
        <button onclick="editarProducto('${p.id}')">✏️ Editar</button>
        <button onclick="eliminarProducto('${p.id}')" class="btn-eliminar">🗑️ Eliminar</button>
      </div>`
    lista.appendChild(div)
  })
}

function mostrarPreview(url) {
  const img = document.getElementById("preview-imagen")
  const placeholder = document.getElementById("preview-placeholder")
  if (url) {
    img.src = url
    img.style.display = "block"
    placeholder.style.display = "none"
  } else {
    img.src = ""
    img.style.display = "none"
    placeholder.style.display = "flex"
  }
  document.getElementById("prod-imagen").value = url || ""
}

document.getElementById("btn-cambiar-imagen").addEventListener("click", () => {
  document.getElementById("input-imagen").click()
})

document.getElementById("btn-quitar-imagen").addEventListener("click", () => {
  document.getElementById("input-imagen").value = ""
  document.getElementById("upload-status").textContent = ""
  mostrarPreview("")
})

document.getElementById("input-imagen").addEventListener("change", async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const status = document.getElementById("upload-status")
  status.textContent = "⏳ Subiendo imagen..."
  status.style.color = "#aaa"

  const ext = file.name.split('.').pop().toLowerCase()
  const filename = `producto_${Date.now()}.${ext}`

  const { error } = await supabase.storage
    .from("catalogo")
    .upload(`productos/${filename}`, file, { upsert: true })

  if (error) {
    status.textContent = "❌ Error al subir. Intenta de nuevo."
    status.style.color = "#f44336"
    console.error(error)
    return
  }

  const { data: urlData } = supabase.storage
    .from("catalogo")
    .getPublicUrl(`productos/${filename}`)

  mostrarPreview(urlData.publicUrl)
  status.textContent = "✅ Imagen subida correctamente"
  status.style.color = "#4caf50"
})

function abrirModal(titulo, prod = null) {
  document.getElementById("modal-titulo").textContent = titulo
  document.getElementById("prod-id").value = prod?.id || ""
  document.getElementById("prod-nombre").value = prod?.nombre || ""
  document.getElementById("prod-descripcion").value = prod?.descripcion || ""
  document.getElementById("prod-precio").value = prod?.precio || ""
  document.getElementById("prod-activo").checked = prod ? prod.activo : true
  document.getElementById("modal-error").textContent = ""
  document.getElementById("upload-status").textContent = ""
  document.getElementById("input-imagen").value = ""
  mostrarPreview(prod?.imagen_url || "")
  llenarSelectsModal(prod?.categoria_id || "", prod?.marca_id || "")
  document.getElementById("modal-producto").style.display = "flex"
}

window.editarProducto = async (id) => {
  const { data: p } = await supabase.from("productos").select("*").eq("id", id).single()
  abrirModal("Editar Producto", p)
}

document.getElementById("btn-nuevo-producto").addEventListener("click", () => {
  abrirModal("Nuevo Producto")
})

function llenarSelectsModal(catSeleccionada, marcaSeleccionada) {
  document.getElementById("prod-categoria").innerHTML = categorias.map(c =>
    `<option value="${c.id}" ${c.id === catSeleccionada ? 'selected' : ''}>${c.nombre}</option>`
  ).join("")
  document.getElementById("prod-marca").innerHTML = marcas.map(m =>
    `<option value="${m.id}" ${m.id === marcaSeleccionada ? 'selected' : ''}>${m.nombre}</option>`
  ).join("")
}

document.getElementById("btn-guardar-producto").addEventListener("click", async () => {
  const id = document.getElementById("prod-id").value
  const datos = {
    nombre: document.getElementById("prod-nombre").value.trim(),
    descripcion: document.getElementById("prod-descripcion").value.trim(),
    precio: document.getElementById("prod-precio").value.trim(),
    imagen_url: document.getElementById("prod-imagen").value.trim(),
    categoria_id: document.getElementById("prod-categoria").value,
    marca_id: document.getElementById("prod-marca").value,
    activo: document.getElementById("prod-activo").checked
  }
  if (!datos.nombre) {
    document.getElementById("modal-error").textContent = "El nombre es obligatorio."
    return
  }
  const btn = document.getElementById("btn-guardar-producto")
  btn.textContent = "Guardando..."
  btn.disabled = true

  let error
  if (id) {
    ({ error } = await supabase.from("productos").update(datos).eq("id", id))
  } else {
    ({ error } = await supabase.from("productos").insert(datos))
  }
  btn.textContent = "Guardar"
  btn.disabled = false

  if (error) {
    document.getElementById("modal-error").textContent = "Error al guardar."
    console.error(error)
  } else {
    document.getElementById("modal-producto").style.display = "none"
    cargarProductos()
  }
})

window.eliminarProducto = async (id) => {
  if (!confirm("¿Eliminar este producto?\nEsta acción no se puede deshacer.")) return
  await supabase.from("productos").delete().eq("id", id)
  cargarProductos()
}

document.getElementById("btn-cancelar-producto").addEventListener("click", () => {
  document.getElementById("modal-producto").style.display = "none"
})

async function cargarMarcasPanel() {
  const { data, error } = await supabase.from("marcas").select("*").order("nombre")
  if (error) return
  const lista = document.getElementById("lista-marcas")
  lista.innerHTML = ""
  data.forEach((m, index) => {
    const div = document.createElement("div")
    div.className = "item-admin"
    div.innerHTML = `
      <span class="item-numero">${index + 1}</span>
      <div class="item-info">
        <strong>${m.nombre}</strong>
        <span class="estado-tag ${m.activo ? 'activo' : 'inactivo'}">${m.activo ? 'Activa' : 'Inactiva'}</span>
      </div>
      <div class="item-acciones">
        <button onclick="toggleMarca('${m.id}', ${m.activo})">${m.activo ? '🔴 Desactivar' : '🟢 Activar'}</button>
      </div>`
    lista.appendChild(div)
  })
}

window.toggleMarca = async (id, activo) => {
  await supabase.from("marcas").update({ activo: !activo }).eq("id", id)
  cargarMarcasPanel()
}
</script>
</body>
</html>
